# FreeBSD Hyprland default config
# Adapted from your NixOS config

# ------------------------------------------------------------
# Variables
# ------------------------------------------------------------

$base = rgb(1e1e2e)
$blue = rgb(89b4fa)
$crust = rgb(11111b)
$green = rgb(a6e3a1)
$lavender = rgb(b4befe)
$mantle = rgb(181825)
$mauve = rgb(cba6f7)
$pink = rgb(f5c2e7)
$red = rgb(f38ba8)
$subtext0 = rgb(a6adc8)
$surface0 = rgb(313244)
$surface1 = rgb(45475a)
$surface2 = rgb(585b70)
$terminal = kitty
$text = rgb(cdd6f4)
$yellow = rgb(f9e2af)

$mainMod = SUPER
$browser = firefox
$launcher = rofi --show drun

# ------------------------------------------------------------
# Environment
# ------------------------------------------------------------

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = MOZ_ENABLE_WAYLAND,1
env = XDG_SCREENSHOTS_DIR,$HOME/Pictures/Screenshots

# No systemd on FreeBSD.
exec-once = dbus-update-activation-environment --all

# ------------------------------------------------------------
# Autostart
# ------------------------------------------------------------

exec-once = waybar
exec-once = mkdir -p $HOME/Pictures/Screenshots

# ------------------------------------------------------------
# Monitor
# ------------------------------------------------------------

# Safer default for MacBook Air: use the panel's preferred mode.
monitor = eDP-1, preferred, 0x0, 1

# External monitors: automatic placement.
monitor = , preferred, auto, 1

# ------------------------------------------------------------
# Input
# ------------------------------------------------------------

input {
    kb_layout = de
    kb_variant = neo_qwertz

    follow_mouse = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

gestures {
    gesture = 3, horizontal, workspace
    workspace_swipe_distance = 300
}

# ------------------------------------------------------------
# General appearance
# ------------------------------------------------------------

general {
    allow_tearing = false
    border_size = 2
    col.active_border = $mauve
    col.inactive_border = $surface1
    gaps_in = 0
    gaps_out = 0
    layout = dwindle
}

decoration {
    rounding = 0

    blur {
        enabled = true
        passes = 1
        size = 3
    }

    shadow {
        enabled = true
        color = $crust
        range = 4
        render_power = 3
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# ------------------------------------------------------------
# Main bindings
# ------------------------------------------------------------

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, W, exec, $browser
bind = $mainMod, D, exec, $launcher

bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exit,

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, j, movefocus, u
bind = $mainMod, k, movefocus, d

bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, j, movewindow, u
bind = $mainMod SHIFT, k, movewindow, d

bind = $mainMod, f, fullscreen, 1
bind = $mainMod SHIFT, f, fullscreen, 0

# Screenshot: full screen
bind = , Print, exec, sh -c 'mkdir -p "$HOME/Pictures/Screenshots"; grim "$HOME/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png"'

# Screenshot: selected area
bind = $mainMod, Print, exec, sh -c 'mkdir -p "$HOME/Pictures/Screenshots"; grim -g "$(slurp)" "$HOME/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png"'

# Toggle gaps
bind = $mainMod, g, exec, sh -c 'if [ -f /tmp/hypr_gaps_on ]; then rm /tmp/hypr_gaps_on; hyprctl keyword general:gaps_in 0; hyprctl keyword general:gaps_out 0; else touch /tmp/hypr_gaps_on; hyprctl keyword general:gaps_in 5; hyprctl keyword general:gaps_out 20; fi'

bind = $mainMod SHIFT, g, exec, sh -c 'if [ -f /tmp/hypr_gaps_on ]; then rm /tmp/hypr_gaps_on; hyprctl keyword general:gaps_in 0; hyprctl keyword general:gaps_out 0; pkill -SIGUSR1 waybar; else touch /tmp/hypr_gaps_on; hyprctl keyword general:gaps_in 5; hyprctl keyword general:gaps_out 20; pkill -SIGUSR1 waybar; fi'

# ------------------------------------------------------------
# Workspaces
# ------------------------------------------------------------

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ------------------------------------------------------------
# Laptop keys
# ------------------------------------------------------------

# Lock on lid switch. Do not disable eDP-1 by default; risky on laptops.
bindl = , switch:Lid Switch, exec, hyprlock

# FreeBSD audio using base mixer.
bindl = , XF86AudioRaiseVolume, exec, mixer vol +5
bindl = , XF86AudioLowerVolume, exec, mixer vol -5
bindl = , XF86AudioMute, exec, sh -c 'mixer vol 0'

# FreeBSD backlight.
bindl = , XF86MonBrightnessUp, exec, backlight incr 10
bindl = , XF86MonBrightnessDown, exec, backlight decr 10

# Media keys.
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# ------------------------------------------------------------
# Mouse bindings
# ------------------------------------------------------------

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ------------------------------------------------------------
# Plugins
# ------------------------------------------------------------

plugin {
}
