# FreeBSD hyprlock.conf
# Nix store sources removed; Catppuccin Mocha colors inlined.

background {
    blur_passes = 2
    blur_size = 4
    color = rgb(1e1e2e)
}

general {
    hide_cursor = true
}

input-field {
    size = 300, 50

    dots_center = true
    dots_size = 0.2
    dots_spacing = 0.35

    fade_on_empty = false
    hide_input = false

    check_color = rgb(cba6f7)
    fail_color = rgb(f38ba8)
    font_color = rgb(cdd6f4)

    inner_color = rgb(1e1e2e)
    outer_color = rgb(313244)
    outline_thickness = 2

    placeholder_text =

    halign = center
    valign = center
    position = 0, -50
}

label {
    text = $TIME

    color = rgb(cdd6f4)
    font_family = monospace
    font_size = 96

    halign = center
    valign = center
    position = 0, 200

    shadow_color = rgb(11111b)
    shadow_passes = 1
}

label {
    text = cmd[update:1000] date +"%A, %d %B"

    color = rgb(a6adc8)
    font_family = monospace
    font_size = 24

    halign = center
    valign = center
    position = 0, 100
}
