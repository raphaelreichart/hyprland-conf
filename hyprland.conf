exec-once = /nix/store/g6a7agib4hbnvqcny05fk8dfjplw8nkb-dbus-1.16.2/bin/dbus-update-activation-environment --systemd DISPLAY HYPRLAND_INSTANCE_SIGNATURE WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE && systemctl --user stop hyprland-session.target && systemctl --user start hyprland-session.target
$base=rgb(1e1e2e)
$blue=rgb(89b4fa)
$browser=librewolf
$crust=rgb(11111b)
$green=rgb(a6e3a1)
$launcher=rofi -show drun run window ssh
$lavender=rgb(b4befe)
$mainMod=SUPER
$mantle=rgb(181825)
$mauve=rgb(cba6f7)
$pink=rgb(f5c2e7)
$red=rgb(f38ba8)
$subtext0=rgb(a6adc8)
$surface0=rgb(313244)
$surface1=rgb(45475a)
$surface2=rgb(585b70)
$terminal=kitty
$text=rgb(cdd6f4)
$yellow=rgb(f9e2af)
source=/nix/store/mbnn5ark4a1lnksxhi3i8fhz9nq8clan-catppuccin-hyprland-0-unstable-2024-06-19/mocha.conf
source=/nix/store/sqy0ia1lhgdwsdr8rprisqca2iwv8pd0-hyprland-mauve-accent.conf
bind=$mainMod, RETURN, exec, $terminal
bind=$mainMod, W, exec, $browser
bind=$mainMod, D, exec, $launcher
bind=$mainMod, Q, killactive,
bind=$mainMod SHIFT, Q, exit,
bind=$mainMod, h, movefocus, l
bind=$mainMod, l, movefocus, r
bind=$mainMod, j, movefocus, u
bind=$mainMod, k, movefocus, d
bind=$mainMod SHIFT, h, movewindow, l
bind=$mainMod SHIFT, l, movewindow, r
bind=$mainMod SHIFT, j, movewindow, u
bind=$mainMod SHIFT, k, movewindow, d
bind=$mainMod, f, fullscreen, 1
bind=$mainMod SHIFT, f, fullscreen, 0
bind=, Print, exec, ~/.config/hypr/scripts/screenshot.sh
bind=$mainMod, g, exec, if [ -f /tmp/hypr_gaps_on ]; then rm /tmp/hypr_gaps_on && hyprctl keyword general:gaps_in 0 && hyprctl keyword general:gaps_out 0; else touch /tmp/hypr_gaps_on && hyprctl keyword general:gaps_in 5 && hyprctl keyword general:gaps_out 20; fi
bind=$mainMod SHIFT, g, exec, if [ -f /tmp/hypr_gaps_on ]; then rm /tmp/hypr_gaps_on && hyprctl keyword general:gaps_in 0 && hyprctl keyword general:gaps_out 0 && pkill -SIGUSR1 waybar; else touch /tmp/hypr_gaps_on && hyprctl keyword general:gaps_in 5 && hyprctl keyword general:gaps_out 20 && pkill -SIGUSR1 waybar; fi
bind=$mainMod, 1, exec, try_swap_workspace 1
bind=$mainMod, 2, exec, try_swap_workspace 2
bind=$mainMod, 3, exec, try_swap_workspace 3
bind=$mainMod, 4, exec, try_swap_workspace 4
bind=$mainMod, 5, exec, try_swap_workspace 5
bind=$mainMod, 6, exec, try_swap_workspace 6
bind=$mainMod, 7, exec, try_swap_workspace 7
bind=$mainMod, 8, exec, try_swap_workspace 8
bind=$mainMod, 9, exec, try_swap_workspace 9
bind=$mainMod, 0, exec, try_swap_workspace 10
bind=$mainMod SHIFT, 1, movetoworkspace, 1
bind=$mainMod SHIFT, 2, movetoworkspace, 2
bind=$mainMod SHIFT, 3, movetoworkspace, 3
bind=$mainMod SHIFT, 4, movetoworkspace, 4
bind=$mainMod SHIFT, 5, movetoworkspace, 5
bind=$mainMod SHIFT, 6, movetoworkspace, 6
bind=$mainMod SHIFT, 7, movetoworkspace, 7
bind=$mainMod SHIFT, 8, movetoworkspace, 8
bind=$mainMod SHIFT, 9, movetoworkspace, 9
bind=$mainMod SHIFT, 0, movetoworkspace, 10
bind=$mainMod, S, togglespecialworkspace, magic
bind=$mainMod SHIFT, S, movetoworkspace, special:magic
bind=$mainMod, mouse_down, workspace, e+1
bind=$mainMod, mouse_up, workspace, e-1

bindl=, switch:Lid Switch, exec, hyprlock
bindl=, switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
bindl=, switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, 1920x1080@60, 0x0, 1"
bindl=,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindl=,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl=,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl=,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl=,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindl=,XF86MonBrightnessDown, exec, brightnessctl s 10%-
bindl=, XF86AudioNext, exec, playerctl next
bindl=, XF86AudioPause, exec, playerctl play-pause
bindl=, XF86AudioPlay, exec, playerctl play-pause
bindl=, XF86AudioPrev, exec, playerctl previous

bindm=$mainMod, mouse:272, movewindow
bindm=$mainMod, mouse:273, resizewindow

decoration {
  blur {
    enabled=true
    passes=1
    size=3
  }

  shadow {
    color=$crust
    enabled=true
    range=4
    render_power=3
  }
  rounding=0
}

env=NIXOS_OZONE_WL,1
env=XDG_CURRENT_DESKTOP,Hyprland
env=XDG_SESSION_TYPE,wayland
env=XDG_SESSION_DESKTOP,Hyprland
env=QT_QPA_PLATFORM,wayland
env=XDG_SCREENSHOTS_DIR,$HOME/Pictures/Screenshots

exec-once=waybar
exec-once=wvkbd-mobintl -L 230 --hidden
exec-once=iio-hyprland

general {
  allow_tearing=false
  border_size=2
  col.active_border=$mauve
  col.inactive_border=$surface1
  gaps_in=0
  gaps_out=0
  layout=dwindle
}

gestures {
  gesture=3, horizontal, workspace
  workspace_swipe_distance=300
}

input {
  kb_layout=de
  kb_variant=neo_qwertz
}

monitor=eDP-1,1920x1080@60,0x0,1
monitor=, preferred, auto, 1, mirror, eDP-1

plugin {
}
